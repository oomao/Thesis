<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Thesis Data Input</title>
</head>

<body>
    <h1>Thesis Data Input</h1>
    <form action="/generate" method="post">
        <h2>Main Data</h2>
        <label for="dept">Dept:</label>
        <input type="text" id="dept" name="dept"><br><br>
        <label for="degree">Degree:</label>
        <input type="text" id="degree" name="degree"><br><br>
        <label for="title">Title:</label>
        <input type="text" id="title" name="title"><br><br>
        <label for="subtitle">Subtitle:</label>
        <input type="text" id="subtitle" name="subtitle"><br><br>
        <label for="author">Author:</label>
        <input type="text" id="author" name="author"><br><br>
        <label for="mprof">Main Prof:</label>
        <input type="text" id="mprof" name="mprof"><br><br>
        <label for="sprofi">Secondary Prof I:</label>
        <input type="text" id="sprofi" name="sprofi"><br><br>
        <label for="sprofii">Secondary Prof II:</label>
        <input type="text" id="sprofii" name="sprofii"><br><br>
        <label for="degreedate">Degree Date:</label>
        <input type="text" id="degreedate" name="degreedate"><br><br>
        <label for="copyyear">Copy Year:</label>
        <input type="text" id="copyyear" name="copyyear"><br><br>

        <h2>Abstract Data</h2>
        <label for="abstract1">Abstract 1:</label>
        <textarea id="abstract1" name="abstract1"></textarea><br><br>
        <label for="abstract2">Abstract 2:</label>
        <textarea id="abstract2" name="abstract2"></textarea><br><br>

        <h2>Acknowledge Data</h2>
        <label for="acknowledge">Acknowledge:</label>
        <textarea id="acknowledge" name="acknowledge"></textarea><br><br>

        <h2>Introduction Data</h2>
        <label for="introduction">Introduction:</label>
        <textarea id="introduction" name="introduction"></textarea><br><br>

        <h2>Related Work Data</h2>
        <label for="relateWork">Related Work:</label>
        <textarea id="relateWork" name="relateWork"></textarea><br><br>

        <h2>Approach Data</h2>
        <label for="approach">Approach:</label>
        <textarea id="approach" name="approach"></textarea><br><br>

        <h2>Conclusion Data</h2>
        <label for="conclusion">Conclusion:</label>
        <textarea id="conclusion" name="conclusion"></textarea><br><br>

        <button type="submit">Generate PDF</button>
    </form>
</body>

</html>
